<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Compare (WebGPU)</title>
  <style>
    body { margin: 0; background: #111; }
    #info { position: fixed; top: 8px; left: 8px; font: 12px monospace;
      color: #fff; background: rgba(0,0,0,0.5); padding: 6px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="info">WebGPU</div>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.webgpu.js",
        "three/webgpu": "../js/vendor/three/build/three.webgpu.js",
        "three/tsl": "../js/vendor/three/build/three.tsl.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { WebGPURenderer } from "three/webgpu";
    import { SplatMesh, WebGPUSplatRenderer } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";

    // Fixed pose shared with webgl.html for an apples-to-apples comparison.
    const SIZE = 800;
    const renderer = new WebGPURenderer({ antialias: false });
    await renderer.init();
    renderer.setSize(SIZE, SIZE);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);

    const splatURL = await getAssetFileURL("butterfly.spz");
    const butterfly = new SplatMesh({ url: splatURL });
    await butterfly.initialized;

    // Append ?nosh to the URL to disable spherical harmonics (base color only).
    const enableSh = !new URLSearchParams(location.search).has("nosh");
    const spark = new WebGPUSplatRenderer({ renderer, enableSh });
    await spark.init();
    scene.add(spark);
    spark.position.set(0, 0, -3);   // fixed pose, no rotation
    spark.setSplatMesh(butterfly);

    renderer.setAnimationLoop(async () => {
      await spark.renderFrame(scene, camera);
    });
  </script>
</body>
</html>
