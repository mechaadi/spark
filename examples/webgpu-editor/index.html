<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Editor (WebGPU)</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }
    #gui { position: absolute; top: 5px; right: 5px; }
    #badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font: 12px/1.4 monospace;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 8px;
      border-radius: 4px;
      pointer-events: none;
      white-space: pre;
    }
    #unsupported {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font: 15px/1.6 system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #unsupported a { color: #6cf; }
    #drop-hint {
      position: absolute;
      inset: 0;
      border: 3px dashed transparent;
      box-sizing: border-box;
      pointer-events: none;
      transition: border-color 0.15s ease;
    }
    #drop-hint.active { border-color: #4CAF50; }
  </style>
</head>

<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <div id="drop-hint"></div>
  <div id="badge">WebGPU</div>
  <div id="gui"></div>
  <div id="unsupported">
    <div>
      <p><strong>WebGPU isn't available in this browser.</strong></p>
      <p>The WebGPU compute backend needs a WebGPU-capable browser/GPU.<br>
      Try the WebGL2 <a href="../editor/">editor</a> instead — it's the default path and works everywhere.</p>
    </div>
  </div>

  <input id="file-input" type="file"
    accept=".ply,.spz,.splat,.ksplat,.zip,.sog,.rad" style="display:none" />

  <script src="/examples/js/vendor/stats.js/build/stats.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.webgpu.js",
        "three/webgpu": "../js/vendor/three/build/three.webgpu.js",
        "three/tsl": "../js/vendor/three/build/three.tsl.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js",
        "lil-gui": "../js/vendor/lil-gui/dist/lil-gui.esm.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { WebGPURenderer } from "three/webgpu";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GUI } from "lil-gui";
    import {
      SplatMesh,
      WebGPUSplatRenderer,
      isWebGPUAvailable,
    } from "@sparkjsdev/spark";
    import { getAssetFileURL } from "../js/get-asset-url.js";

    const canvas = document.getElementById("canvas");
    const badge = document.getElementById("badge");

    // The WebGPU editor only runs on the compute backend; there is no WebGL2
    // fallback *on this page* (that's what ../editor/ is). Detect up front so we
    // show a helpful message instead of a black screen.
    if (!isWebGPUAvailable()) {
      document.getElementById("unsupported").style.display = "flex";
      document.getElementById("gui").style.display = "none";
      badge.style.display = "none";
      throw new Error("WebGPU unavailable");
    }

    // --- Renderer / scene -------------------------------------------------
    const renderer = new WebGPURenderer({ canvas, antialias: false });
    await renderer.init();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#000000");
    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 3);

    const spark = new WebGPUSplatRenderer({ renderer, enableSh: true });
    await spark.init();
    scene.add(spark);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.minDistance = 0.2;
    controls.maxDistance = 50;

    const stats = new Stats();
    document.body.appendChild(stats.dom);
    stats.dom.style.display = "none";

    let highDpi = true;
    function handleResize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setPixelRatio(highDpi ? window.devicePixelRatio : 1);
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    handleResize();
    window.addEventListener("resize", handleResize);

    // --- Splat loading (single mesh; WebGPU backend is one-mesh) ----------
    // The compute backend renders PackedSplats only, so we load plain
    // SplatMeshes (no extSplats / no LOD) and hand them to setSplatMesh, which
    // replaces whatever was loaded before. ExtSplats/Paged/dyno scenes belong
    // on the WebGL2 ../editor/ page (directives D4/D5/D6).
    let currentMesh = null;

    async function loadSource(src) {
      const init = typeof src === "string" ? { url: src } : { fileBytes: src.bytes, fileName: src.name };
      let mesh;
      try {
        mesh = new SplatMesh(init);
        await mesh.initialized;
      } catch (err) {
        console.error("Failed to load splat:", err);
        alert(`Could not load splat:\n${err.message ?? err}`);
        return;
      }

      currentMesh = mesh;
      // enableSh is read by setSplatMesh, so apply the current toggle first.
      spark.enableSh = guiOptions.enableSh;
      spark.setSplatMesh(mesh);

      const n = mesh.packedSplats?.numSplats ?? 0;
      guiOptions.splatCount = n.toLocaleString();
      guiOptions.source = typeof src === "string"
        ? src.split("/").pop().split("?")[0]
        : src.name;
      updateBadge();
      // Frame the model: point the orbit target at its center.
      const box = mesh.getBoundingBox(true);
      box.getCenter(controls.target);
    }

    async function loadFiles(fileList) {
      // One mesh at a time — take the first supported file.
      const file = fileList[0];
      if (!file) return;
      const bytes = new Uint8Array(await file.arrayBuffer());
      await loadSource({ bytes, name: file.name });
    }

    function updateBadge() {
      badge.textContent =
        `WebGPU\n${guiOptions.source}\n${guiOptions.splatCount} splats`;
    }

    // --- GUI --------------------------------------------------------------
    const guiOptions = {
      source: "—",
      splatCount: "—",
      enableSh: true,
      autoRotate: false,
      highDpi: true,
      background: "#000000",
      showStats: false,
      openFile: () => fileInput.click(),
      url: "",
      loadFromUrl: () => {
        const u = guiOptions.url.trim();
        if (!u) return;
        if (!/^https?:\/\//.test(u)) {
          alert("Enter an http(s):// URL to a .ply/.spz/.splat/.ksplat/.zip/.sog/.rad file.");
          return;
        }
        loadSource(u);
      },
      resetPose: () => {
        camera.position.set(0, 0, 3);
        controls.target.set(0, 0, 0);
        controls.update();
      },
    };

    const gui = new GUI({ title: "WebGPU Editor", container: document.getElementById("gui") });

    const fileFolder = gui.addFolder("Scene");
    fileFolder.add(guiOptions, "openFile").name("Open file…");
    fileFolder.add(guiOptions, "url").name("URL");
    fileFolder.add(guiOptions, "loadFromUrl").name("Load from URL");
    fileFolder.add(guiOptions, "source").name("Loaded").listen().disable();
    fileFolder.add(guiOptions, "splatCount").name("Splats").listen().disable();

    const viewFolder = gui.addFolder("View");
    viewFolder.add(guiOptions, "autoRotate").name("Auto-rotate").onChange((v) => {
      controls.autoRotate = v;
    });
    viewFolder.add(guiOptions, "resetPose").name("Reset camera");
    viewFolder.addColor(guiOptions, "background").name("Background").onChange((v) => {
      scene.background.set(v);
    });
    viewFolder.add(guiOptions, "highDpi").name("High DPI").onChange((v) => {
      highDpi = v;
      handleResize();
    });
    viewFolder.add(guiOptions, "showStats").name("Show FPS").onChange((v) => {
      stats.dom.style.display = v ? "block" : "none";
    });

    // Knobs the compute backend actually exposes (see WebGPUSplatRenderer).
    const renderFolder = gui.addFolder("Splat rendering");
    renderFolder.add(guiOptions, "enableSh").name("Spherical harmonics").onChange(() => {
      // SH buffers are (un)uploaded in setSplatMesh, so re-apply the mesh.
      if (currentMesh) {
        spark.enableSh = guiOptions.enableSh;
        spark.setSplatMesh(currentMesh);
      }
    });
    renderFolder.add(spark, "maxStdDev", 0.5, 4, 0.01).name("Max std dev");
    renderFolder.add(spark, "minAlpha", 0, 0.1, 0.0005).name("Min alpha");
    renderFolder.add(spark, "maxPixelRadius", 16, 1024, 1).name("Max pixel radius");

    // --- File input + drag/drop ------------------------------------------
    const fileInput = document.getElementById("file-input");
    fileInput.onchange = (e) => loadFiles([...e.target.files]);

    const dropHint = document.getElementById("drop-hint");
    const SUPPORTED = [".ply", ".spz", ".splat", ".ksplat", ".zip", ".sog", ".rad"];
    canvas.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropHint.classList.add("active");
    });
    canvas.addEventListener("dragleave", () => dropHint.classList.remove("active"));
    canvas.addEventListener("drop", (e) => {
      e.preventDefault();
      dropHint.classList.remove("active");
      const files = [...e.dataTransfer.files].filter((f) =>
        SUPPORTED.some((ext) => f.name.toLowerCase().endsWith(ext)));
      if (files.length) loadFiles(files);
    });

    // --- Initial scene ----------------------------------------------------
    // ?url=<splat> overrides; otherwise show the butterfly demo asset.
    const urlParam = new URLSearchParams(location.search).get("url");
    await loadSource(urlParam ?? (await getAssetFileURL("butterfly.spz")));

    // --- Render loop ------------------------------------------------------
    renderer.setAnimationLoop(async () => {
      stats.begin();
      controls.update();
      await spark.renderFrame(scene, camera);
      stats.end();
    });
  </script>
</body>

</html>
