<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark • Benchmark (WebGPU)</title>
  <style>
    body { margin: 0; background: #000; }
    #info { position: fixed; top: 8px; left: 8px; font: 13px monospace;
      color: #0f0; background: rgba(0,0,0,0.6); padding: 6px 8px; border-radius: 4px; white-space: pre; }
  </style>
</head>
<body>
  <div id="info">WebGPU — loading…</div>
  <script type="importmap">
    {
      "imports": {
        "three": "../js/vendor/three/build/three.webgpu.js",
        "three/webgpu": "../js/vendor/three/build/three.webgpu.js",
        "three/tsl": "../js/vendor/three/build/three.tsl.js",
        "three/addons/": "../js/vendor/three/examples/jsm/",
        "@sparkjsdev/spark": "../../dist/spark.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { WebGPURenderer } from "three/webgpu";
    import { SplatMesh, PackedSplats, WebGPUSplatRenderer } from "@sparkjsdev/spark";
    import { generatePackedSplats, makeFpsMeter } from "./gen.js";

    const count = Number(new URLSearchParams(location.search).get("count") || 1_000_000);
    const info = document.getElementById("info");

    const renderer = new WebGPURenderer({ antialias: false });
    await renderer.init();
    // WebGPURenderer falls back to WebGL2 if a WebGPU device can't be acquired;
    // the WGSL splat path can't run there (it crashes in the GLSL parser).
    if (renderer.backend?.isWebGPUBackend !== true) {
      info.textContent = "WebGPU unavailable — fell back to WebGL2, which this page can't use.";
      throw new Error("WebGPU device unavailable (fell back to WebGL2)");
    }
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

    const packedArray = generatePackedSplats(count);
    const packedSplats = new PackedSplats({ packedArray, numSplats: count });
    const mesh = new SplatMesh({ packedSplats });
    await mesh.initialized;

    const spark = new WebGPUSplatRenderer({ renderer });
    await spark.init();
    scene.add(spark);
    spark.position.set(0, 0, -5);
    spark.setSplatMesh(mesh);

    const fps = makeFpsMeter();
    window.__bench = { backend: "webgpu", count, fps: 0 };
    renderer.setAnimationLoop(async (t) => {
      spark.rotation.y += 0.003;
      await spark.renderFrame(scene, camera);
      const f = fps.tick(t);
      window.__bench.fps = f;
      info.textContent = `WebGPU\nsplats: ${count.toLocaleString()}\nfps: ${f}`;
    });
  </script>
</body>
</html>
